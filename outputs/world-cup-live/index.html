<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Cup Replays</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero__media" aria-hidden="true"></div>
        <nav class="topbar" aria-label="Primary">
          <a class="brand" href="#matches" aria-label="World Cup Replays home">
            <span class="brand__mark">WC</span>
            <span>World Cup Replays</span>
          </a>
          <div class="topbar__actions">
            <button class="icon-button" id="refreshBtn" type="button" aria-label="Refresh matches" title="Refresh matches">
              <span aria-hidden="true">R</span>
            </button>
          </div>
        </nav>

        <section class="hero__content" aria-labelledby="pageTitle">
          <p class="eyebrow">Goal highlights, match replays, video clips</p>
          <h1 id="pageTitle">World Cup replay center</h1>
          <p class="hero__copy">Open a match, click the replay count, then pick a goal or highlight clip to watch inside the match board.</p>
          <div class="hero__status" id="dataStatus" role="status">Loading highlights</div>
        </section>
      </header>

      <main>
        <section class="controls" aria-label="Match filters">
          <div class="segmented" role="tablist" aria-label="Status filter">
            <button class="segment is-active" data-filter="all" role="tab" aria-selected="true" type="button">All</button>
            <button class="segment" data-filter="goals" role="tab" aria-selected="false" type="button">Goals</button>
            <button class="segment" data-filter="highlights" role="tab" aria-selected="false" type="button">Highlights</button>
            <button class="segment" data-filter="latest" role="tab" aria-selected="false" type="button">Latest</button>
          </div>
          <label class="search">
            <span class="sr-only">Search matches</span>
            <input id="searchInput" type="search" placeholder="Search team, competition, clip" autocomplete="off" />
          </label>
        </section>

        <section class="board" id="matches" aria-label="Matches">
          <div class="match-list" id="matchList"></div>
          <aside class="detail" id="matchDetail" aria-label="Selected match details"></aside>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
